# Alembic configuration for ShopFloorScheduler
# Manages database schema migrations

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path to prepend for module imports
prepend_sys_path = .

# timezone for migration file timestamps (UTC recommended)
timezone = UTC

# Database URL — reads from DATABASE_URL env var, falls back to SQLite
sqlalchemy.url = sqlite:///./shopfloor.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
